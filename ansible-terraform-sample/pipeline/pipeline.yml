# YAML anchors
shared:
  - &merge-stack-and-config
    platform: linux
    image_resource:
      type: docker-image
      source:
        repository: cycloid/cycloid-toolkit
        tag: "v2.9"
    run:
      path: /usr/bin/merge-stack-and-config
    outputs:
    - name: merged-stack
      path: "merged-stack"

  - &run-ansible
    config:
      platform: linux
      image_resource:
        type: docker-image
        source:
          repository: cycloid/cycloid-toolkit
          tag: "v2.9"
{% if stack_usecase == "raw" %}
      run:
        path: /bin/bash
        args:
          - '-exc'
          - |
            # Here is a placeholder to create a static inventory file.
            # In this example we will simply run locally ansible inside the worker.
            cat > merged-stack/inventory.ini <<EOF
            [all]
            localhost ansible_connection=local gather_facts=false
            EOF
            export ANSIBLE_INVENTORY=inventory.ini

            # Run ansible
            /usr/bin/ansible-runner
{% else %}
      run:
        path: /usr/bin/ansible-runner
{% endif %}
      caches:
        - path: ansible-playbook/roles
      inputs:
      - name: merged-stack
        path: merged-stack

groups:
- name: overview
  jobs:
  - terraform-plan
  - terraform-apply
  - ansible-run
- name: destroy
  jobs:
  - terraform-destroy

resource_types:
- name: terraform
  type: docker-image
  source:
    repository: cycloid/terraform-resource
    tag: '1.3.9'

resources:
- name: tfstate
  type: terraform
  icon: terraform
  source:
    env_name: ((env))
    backend_type: http
    backend_config:
      address: '((cycloid_api_url))/inventory?jwt=($ inventory_jwt $)'
      skip_cert_verification: true
    vars:
{% if stack_usecase == "aws" %}
      aws_cred: ((aws_cred))
      aws_region: ((aws_default_region))
{% elif stack_usecase == "gcp" %}
      gcp_project: ((gcp_project))
      gcp_zone: ((gcp_zone))
{% elif stack_usecase == "azure" %}
      azure_env: ((azure_env))
      azure_cred: ((azure_cred))
{% endif %}
      env: ((env))
      project: ((project))
      organization: ((org))

{% if stack_usecase == "gcp" %}
    env:
      GOOGLE_PROJECT: ((gcp_project))
      GOOGLE_ZONE: ((gcp_zone))
      GOOGLE_CREDENTIALS: ((gcp_credentials_json))
{% endif %}

{% for techno, cfg_path in {"ansible": "((project))/ansible/environments/((env))-*", "terraform": "((project))/terraform/((env))/*"}.items() %}
# Git stack repositories
- name: git_stack-{{ techno }}
  icon: github-circle
  type: git
  source:
    uri: ($ scs_url $)
    branch: ($ scs_branch $)
{% if auth_type == "http" %}
    username: ((stack_git_username))
    password: ((stack_git_password))
{% else %}
    private_key: ((stack_git_private_key))
{% endif %}
    paths:
      - ((stack_path))/{{ techno }}/*

# Git config repositories
- name: git_config-{{ techno }}
  type: git
  icon: github-circle
  source:
    uri: ($ cr_url $)
    branch: ($ cr_branch $)
{% if auth_type == "http" %}
    username: ((config_git_username))
    password: ((config_git_password))
{% else %}
    private_key: ((config_git_private_key))
{% endif %}
    paths:
      - {{ cfg_path }}

{% endfor %}

jobs:

  - name: terraform-plan
    serial: true
    serial_groups: [terraform]
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - do:
        - get: git_stack-terraform
          params: {depth: 1}
          trigger: true
        - get: git_config-terraform
          params: {depth: 1}
          trigger: true

        - task: merge-stack-and-config
          config:
            <<: *merge-stack-and-config
            inputs:
            - name: git_config-terraform
              path: "config"
            - name: git_stack-terraform
              path: "stack"
          params:
            CONFIG_PATH: ((project))/terraform/((env))
            STACK_PATH: ((stack_path))/terraform

        - put: tfstate
          params:
            plan_only: true
            terraform_source: merged-stack/

  - name: terraform-apply
    serial: true
    serial_groups: [terraform]
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - do:
        - get: git_stack-terraform
          trigger: false
          passed:
            - terraform-plan
        - get: git_config-terraform
          trigger: false
          passed:
            - terraform-plan
        - get: tfstate
          trigger: false
          passed:
            - terraform-plan

        - task: merge-stack-and-config
          config:
            <<: *merge-stack-and-config
            inputs:
            - name: git_config-terraform
              path: "config"
            - name: git_stack-terraform
              path: "stack"
          params:
            CONFIG_PATH: ((project))/terraform/((env))
            STACK_PATH: ((stack_path))/terraform

        - put: tfstate
          params:
            plan_run: true
            terraform_source: merged-stack/

  - name: terraform-destroy
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - do:
          - get: git_stack-terraform
            params: {depth: 1}
            trigger: false
          - get: git_config-terraform
            params: {depth: 1}
            trigger: false
          - task: merge-stack-and-config
            config:
              <<: *merge-stack-and-config
              inputs:
              - name: git_config-terraform
                path: "config"
              - name: git_stack-terraform
                path: "stack"
            params:
              CONFIG_PATH: ((project))/terraform/((env))
              STACK_PATH: ((stack_path))/terraform

          - put: tfstate
            params:
              action: destroy
              terraform_source: merged-stack/
            get_params:
              action: destroy

  - name: ansible-run
    serial: true
    build_logs_to_retain: 10
    plan:
    - do:
      - get: git_stack-ansible
        params: {depth: 1}
        trigger: true

      - get: git_config-ansible
        params: {depth: 1}
        trigger: true

      - get: tfstate
        passed:
          - terraform-apply
        trigger: true

      - task: merge-stack-and-config
        config:
          <<: *merge-stack-and-config
          inputs:
          - name: git_config-ansible
            path: "config"
          - name: git_stack-ansible
            path: "stack"
          - name: tfstate
            path: "terraform"
        params:
          CONFIG_PATH: ((project))/ansible/
          STACK_PATH: ((stack_path))/ansible

      - task: run-ansible
        <<: *run-ansible
        params:
          # See ansible-runner doc for more details on the following environment variables
          # https://github.com/cycloidio/docker-cycloid-toolkit#ansible-runner
          SSH_PRIVATE_KEY: ((ansible_ssh_private_key_pair))
          # You can put here the IP address of a Bastion server
          # SSH_JUMP_URL: 1.2.3.4
          ANSIBLE_PLAYBOOK_PATH: merged-stack
          ANSIBLE_PLAYBOOK_NAME: site.yml
          ANSIBLE_FORCE_GALAXY: false
          ANSIBLE_STDOUT_CALLBACK: default
          EXTRA_ANSIBLE_VARS:
            org: ((org))
            project: ((project))
            env: ((env))
{% if stack_usecase == "aws" %}
          # By providing those credentials, Cycloid Ansible runner will
          # Automatically use Amazon dynamic inventory to get instances IP's and
          # groups based on Aws Tags
          AWS_DEFAULT_REGION: ((aws_default_region))
          AWS_ACCESS_KEY_ID: ((aws_access_key))
          AWS_SECRET_ACCESS_KEY: ((aws_secret_key))
{% elif stack_usecase == "gcp" %}
          # By providing those credentials, Cycloid Ansible runner will
          # Automatically use GCP dynamic inventory to get instances IP's and
          # groups based on GCP Labels
          GCP_SERVICE_ACCOUNT_CONTENTS: ((gcp_credentials_json))
{% elif stack_usecase == "azure" %}
          # By providing those credentials, Cycloid Ansible runner will
          # Automatically use Azure dynamic inventory to get instances IP's and
          # groups based on Azure Labels
          AZURE_SUBSCRIPTION_ID: Used by Azure dynamic inventory
          AZURE_TENANT_ID: Used by Azure dynamic inventory
          AZURE_CLIENT_ID: Used by Azure dynamic inventory
          AZURE_SECRET: Used by Azure dynamic inventory
{% endif %}
